# Fly.io deployment configuration for Prelegal
# Docs: https://fly.io/docs/reference/configuration/
#
# Before deploying, replace "your-app-name" below with your chosen app name.
# App names must be globally unique on Fly.io (e.g. "prelegal-yourname").

app = "your-app-name"
primary_region = "iad"

[build]
  # Uses the Dockerfile at the project root (multi-stage Node → Python build)

[env]
  # Non-secret environment variables.
  # Secrets (OPENROUTER_API_KEY, JWT_SECRET_KEY) are set via `fly secrets set`.
  DB_PATH = "/data/prelegal.db"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[[mounts]]
  # Persistent volume — SQLite data survives deploys and restarts.
  # Create before first deploy: fly volumes create prelegal_data --size 1 --region iad
  source = "prelegal_data"
  destination = "/data"
